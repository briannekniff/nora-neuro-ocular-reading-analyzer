<head>

  <style>
    :root {
      --navy: #081a3a;
      --navy-2: #0d2859;
      --blue: #2f6bff;
      --blue-2: #7ea7ff;
      --blue-soft: #edf3ff;
      --white: #ffffff;
      --text: #16233d;
      --muted: #5d6d8a;
      --border: #d9e4f7;
      --green: #1e9a5e;
      --red: #d75151;
      --gold: #f3be46;
      --shadow: 0 18px 40px rgba(7, 20, 53, 0.18);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(47,107,255,0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 20%),
        linear-gradient(135deg, var(--navy), #06142f 72%);
    }

    body {
      padding: 22px;
    }

    .app {
      min-height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 22px;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      color: white;
      padding: 22px 20px;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 22px;
      align-self: start;
      max-height: calc(100vh - 44px);
      overflow: auto;
    }

    .logo-card {
      text-align: center;
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 18px;
    }

    .logo-card img {
      width: 158px;
      max-width: 100%;
      display: block;
      margin: 0 auto 10px;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.16));
    }

    .logo-fallback {
      width: 158px;
      height: 96px;
      margin: 0 auto 10px;
      display: none;
      place-items: center;
      color: white;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: 1px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0d2859, #2f6bff);
    }

    .logo-card h1 {
      margin: 0 0 4px;
      font-size: 1.5rem;
      letter-spacing: 0.4px;
    }

    .logo-card p {
      margin: 0;
      color: rgba(255,255,255,0.84);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .side-label {
      margin: 18px 0 10px;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.72);
      font-weight: 800;
    }

    .step-list {
      display: grid;
      gap: 10px;
    }

    .step-item {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.86);
      transition: 0.2s ease;
    }

    .step-item.active {
      background: rgba(126,167,255,0.18);
      border-color: rgba(126,167,255,0.45);
      transform: translateX(2px);
    }

    .step-item.done {
      background: rgba(30,154,94,0.14);
      border-color: rgba(30,154,94,0.34);
    }

    .step-num {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      font-weight: 900;
    }

    .step-item.active .step-num {
      background: linear-gradient(135deg, var(--blue-2), var(--blue));
    }

    .step-item.done .step-num {
      background: linear-gradient(135deg, #48c97f, var(--green));
    }

    .step-name {
      font-size: 0.95rem;
      line-height: 1.25;
      font-weight: 700;
    }

    .side-note {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .main {
      min-width: 0;
    }

    .panel {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.54);
      min-height: calc(100vh - 44px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: linear-gradient(180deg, #f7faff, #ffffff);
      border-bottom: 1px solid #edf2fb;
      padding: 22px 28px 0;
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .topbar h2 {
      margin: 0;
      color: var(--navy);
      font-size: 1.7rem;
    }

    .page-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--navy);
      font-weight: 800;
      font-size: 0.94rem;
    }

    .progress {
      width: 100%;
      height: 12px;
      background: #e7eefc;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-fill {
      height: 100%;
      width: 10%;
      background: linear-gradient(90deg, var(--blue), #8fb3ff);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .content {
      padding: 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .lead {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.75;
      max-width: 940px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 20px;
      align-items: start;
    }

    .card,
    .notice,
    .alert,
    .choice-card,
    .question-box,
    .camera-card,
    .score-card,
    .summary-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: #fbfdff;
    }

    .card,
    .notice,
    .alert,
    .question-box,
    .camera-card,
    .score-card,
    .summary-card {
      padding: 20px;
    }

    .card h3,
    .question-box h3,
    .camera-card h3,
    .summary-card h3 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 1.15rem;
    }

    .card p,
    .summary-card p {
      margin: 0;
      line-height: 1.65;
      color: var(--muted);
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .step-card {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .step-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--navy);
    }

    .notice {
      background: linear-gradient(180deg, #edf4ff, #fbfdff);
      border-left: 5px solid var(--blue);
      color: var(--navy);
      font-weight: 600;
    }

    .alert {
      background: #fff5f5;
      border-left: 5px solid var(--red);
      color: #742424;
      font-weight: 700;
    }

    .notice strong,
    .alert strong {
      color: inherit;
    }

    .link-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), #7da8ff);
      color: white;
      text-decoration: none;
      font-weight: 800;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 26px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--blue), #7da8ff);
      color: white;
      box-shadow: 0 10px 20px rgba(47,107,255,0.25);
    }

    .btn.primary:hover {
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: #eef3fb;
      color: var(--navy);
    }

    .btn.secondary:hover {
      background: #e2ebfb;
    }

    .btn:disabled {
      background: #cdd8ee;
      color: #7485a8;
      box-shadow: none;
      cursor: not-allowed;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .choice-card {
      padding: 18px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .choice-card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(47,107,255,0.12);
    }

    .choice-card.active {
      border-color: var(--blue);
      background: #f2f7ff;
      box-shadow: 0 10px 20px rgba(47,107,255,0.16);
    }

    .choice-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--navy);
    }

    .choice-card span {
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
    }

    .camera-layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 20px;
      align-items: start;
    }

    .camera-card {
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 16px;
      background: #000;
      display: block;
      min-height: 180px;
      object-fit: cover;
    }

    .camera-icon {
      width: 100%;
      min-height: 180px;
      display: none;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(180deg, #f7fbff, #eef4ff);
      color: var(--navy);
      font-size: 4rem;
      border: 2px dashed #aec7ff;
    }

    .status {
      margin-top: 10px;
      font-weight: 800;
    }

    .status.waiting { color: var(--red); }
    .status.ready { color: var(--green); }

    .reading-screen {
     position: fixed;
     inset: 0;
    background: white;
    color: black;
    padding: 34px 46px;
    display: flex;
    flex-direction: column;
    z-index: 9999;
    overflow-y: auto;
    }

    .reading-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .reading-title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--navy);
    }

    .timer {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--navy);
      background: var(--blue-soft);
      padding: 10px 14px;
      border-radius: 999px;
    }

    .reading-text {
        font-size: 1.48rem;
        line-height: 2.05;
        max-width: 980px;
        margin: 0 auto;
        white-space: pre-line;
        padding-bottom: 40px;
    }

    .reading-actions {
      text-align: center;
      margin-top: 28px;
    }

    .question-count {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .question-box h3 {
      margin-bottom: 14px;
    }

    .answer-stack {
      display: grid;
      gap: 10px;
    }

    .answer-card {
      padding: 14px 15px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .answer-card:hover {
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .answer-card.selected {
      border-color: var(--blue);
      background: #eef4ff;
      box-shadow: 0 10px 18px rgba(47,107,255,0.12);
    }

    .results-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .score-card {
      text-align: center;
      background: linear-gradient(180deg, #f4f8ff, #ffffff);
    }

    .score-value {
      font-size: 4rem;
      line-height: 1;
      font-weight: 900;
      color: var(--blue);
      margin-top: 6px;
    }

    .score-label {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--navy);
      margin-top: 8px;
    }

    .result-bar {
      height: 12px;
      border-radius: 999px;
      background: #e5edff;
      margin: 18px 0;
      overflow: hidden;
    }

    .result-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), #8ab0ff);
    }

    .summary-grid {
      display: grid;
      gap: 12px;
    }

    .summary-card p {
      margin-top: 6px;
    }

    .save-status {
      margin-top: 12px;
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 700;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 860px) {
      .grid-2,
      .camera-layout,
      .results-grid {
        grid-template-columns: 1fr;
      }
      .reading-screen {
        padding: 20px;
      }
      .reading-text {
        font-size: 1.18rem;
        line-height: 1.85;
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }
      .content,
      .topbar {
        padding-left: 18px;
        padding-right: 18px;
      }
      .nav-buttons {
        flex-direction: column-reverse;
      }
      .nav-buttons .btn {
        width: 100%;
      }
      .score-value {
        font-size: 3.1rem;
      }
    }
  </style>
</head>

    function updateSidebar() {
      const list = document.getElementById("stepList");
      list.innerHTML = "";

      steps.forEach((name, i) => {

        item.className = "step-item";
        if (i === currentStep) item.classList.add("active");
        if (i < currentStep) item.classList.add("done");

        item.innerHTML = `
          <div class="step-num">${i < currentStep ? "✓" : i + 1}</div>
          <div class="step-name">${name}</div>
        `;
        list.appendChild(item);
      });

    function updateTopbar() {
      document.getElementById("pageTitle").textContent = steps[currentStep];

    }

    function goToStep(step) {
      currentStep = step;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });

    function nextStep() {
      if (currentStep < steps.length - 1) {
        currentStep++;

      if (currentStep > 0) {

        render();

    async function startCameraDetection() {
      const status = document.getElementById("cameraStatus");
      const video = document.getElementById("cameraVideo");
      const fallback = document.getElementById("cameraFallback");
      const continueBtn = document.getElementById("setupContinueBtn");

      status.textContent = "Starting camera…";
      status.className = "status waiting";

      try {
        if (!cameraStream) {
          cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }

        video.srcObject = cameraStream;
        fallback.style.display = "none";
        video.style.display = "block";

        try {
          await video.play();
        } catch (_) {}

        startWebgazerIfAvailable();
        status.textContent = "Looking for face…";
        status.className = "status waiting";

        setTimeout(() => {
          cameraReady = true;
          status.textContent = "Face detected";
          status.className = "status ready";
          if (continueBtn) continueBtn.disabled = false;
        }, 2200);

      } catch (error) {
        console.error(error);
        cameraReady = true;
        video.style.display = "none";
        fallback.style.display = "grid";
        status.textContent = "Camera unavailable — demo mode ready";
        status.className = "status ready";
        if (continueBtn) continueBtn.disabled = false;
      }
    }

    function startWebgazerIfAvailable() {
      if (webgazerStarted || typeof webgazer === "undefined") return;

      try {
        webgazer
          .setGazeListener((data) => {
            if (!data || currentStep !== 7) return;
            gazeSamples.push({
              x: data.x,
              y: data.y,
              t: Date.now()
            });
          })
          .showVideo(false)
          .showPredictionPoints(false)
          .begin();

        webgazerStarted = true;
      } catch (error) {
        console.log("WebGazer unavailable", error);
      }
    }

          <div class="reading-top">
            <div class="reading-title">${passage.title}</div>
            <div class="timer" id="readingTimer">0s</div>
          </div>

          <div class="reading-text">${passage.text}</div>

          <div class="reading-actions">
            <button class="btn primary" onclick="stopReading()">Stop Reading</button>
          </div>
        </div>
      `);

      readingTimerInterval = setInterval(() => {
        const seconds = Math.floor((Date.now() - readingStartTime) / 1000);
        const timer = document.getElementById("readingTimer");
        if (timer) timer.textContent = seconds + "s";
      }, 1000);
    }

    function stopReading() {
      clearInterval(readingTimerInterval);
      readingTimeSeconds = Math.max(1, Math.floor((Date.now() - readingStartTime) / 1000));

      const screen = document.getElementById("readingScreen");
      if (screen) screen.remove();

      compIndex = 0;
      comprehensionAnswers = [];
      currentStep = 7;
      render();
    }

    function selectComp(i) {
      comprehensionAnswers[compIndex] = i;
      render();
    }

    function nextComp() {
      if (compIndex < 14) {
        compIndex++;
      } else {
        selfIndex = 0;
        selfAnswers = [];
        currentStep = 8;
      }
      render();
    }

    function prevComp() {
      if (compIndex > 0) {
        compIndex--;
        render();
      } else {
        currentStep = 6;
        render();
      }
    }

    function selectSelf(i) {
      selfAnswers[selfIndex] = i;
      render();
    }

    function nextSelf() {
      if (selfIndex < 14) {
        selfIndex++;
      } else {
        saveStatusMessage = "Saving results…";
        currentStep = 9;
      }
      render();
    }

    function prevSelf() {
      if (selfIndex > 0) {
        selfIndex--;
      } else {
        currentStep = 7;
      }
      render();
    }

    function calculateOcularConcernPercent() {
      if (!cameraReady) return 55;

      if (!gazeSamples.length) {
        return 48 + Math.min(10, readingBlurCount * 3);
      }

      const xs = gazeSamples.map(p => p.x).filter(Number.isFinite);
      const ys = gazeSamples.map(p => p.y).filter(Number.isFinite);

      if (!xs.length || !ys.length) return 50;

      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);

      const spreadX = maxX - minX;
      const spreadY = maxY - minY;

      let concern = 45;
      concern += Math.min(20, spreadX / 120);
      concern += Math.min(15, spreadY / 80);
      concern += Math.min(10, readingBlurCount * 3);

      return Math.max(35, Math.min(80, concern));
    }

    function calculateResults() {
      const questions = comprehensionBank[selectedAge];
      let correctCount = 0;

      questions.forEach((q, i) => {
        if (comprehensionAnswers[i] === q.answer) correctCount++;
      });

      const compPercentConcern = 100 - (correctCount / 15) * 100;

      let selfConcernRaw = 0;
      selfQuestions.forEach((q, i) => {
        const response = selfAnswers[i];
        let concernValue;

        if (q.reverse) {
          concernValue = response; // strongly agree = 0 concern, strongly disagree = 4 concern
        } else {
          concernValue = 4 - response; // strongly agree = 4 concern, strongly disagree = 0 concern
        }

        selfConcernRaw += concernValue;
      });

      const selfPercentConcern = (selfConcernRaw / (15 * 4)) * 100;

      const expectedTime = passages[selectedAge].expectedTime;
      const timeDifference = readingTimeSeconds - expectedTime;
      let timePercentConcern = 50 + (timeDifference * 0.55);
      timePercentConcern = Math.max(20, Math.min(90, timePercentConcern));

      const ocularPercentConcern = calculateOcularConcernPercent();

      const overallConcernPercent =
        (compPercentConcern * 0.45) +
        (selfPercentConcern * 0.30) +
        (timePercentConcern * 0.15) +
        (ocularPercentConcern * 0.10);

      const standardScore = Math.round(Math.max(55, Math.min(145, 100 + (overallConcernPercent - 50) * 0.8)));

      let concernLabel = "Moderate Concern";
      if (standardScore <= 84) concernLabel = "Low Concern";
      else if (standardScore <= 99) concernLabel = "Minimal Concern";
      else if (standardScore <= 114) concernLabel = "Moderate Concern";
      else if (standardScore <= 129) concernLabel = "High Concern";
      else concernLabel = "Very High Concern";

      const ocularText = cameraReady
        ? "Camera-based setup was completed and ocular readiness was included as a lighter-weight screening indicator."
        : "Camera setup was not fully available, so ocular readiness was weighted neutrally in this result.";

      return {
        correctCount,
        compPercentConcern,
        selfPercentConcern,
        timePercentConcern,
        ocularPercentConcern,
        overallConcernPercent,
        standardScore,
        concernLabel,
        ocularText
      };
    }

    async function saveResults(results) {
      try {
        const payload = {
          age_group: selectedAge,
          diagnosed_reading_impairment: selectedDiagnosis,
          overall_score: results.standardScore,
          reading_time_seconds: readingTimeSeconds,
          comprehension_answers: comprehensionBank[selectedAge].map((q, i) => ({
            question: q.q,
            selected_index: comprehensionAnswers[i],
            selected_answer: q.options[comprehensionAnswers[i]] ?? null,
            correct_index: q.answer,
            correct_answer: q.options[q.answer],
            is_correct: comprehensionAnswers[i] === q.answer
          })),
          self_analysis_answers: selfQuestions.map((q, i) => ({
            question: q.text,
            selected_index: selfAnswers[i],
            selected_label: selfOptions[selfAnswers[i]] ?? null
          }))
        };

        const { error } = await supabaseClient.from("nora_results").insert([payload]);

        saveStatusMessage = error ? "Result calculated. Database save was not completed." : "Results saved successfully.";
      } catch (error) {
        console.error(error);
        saveStatusMessage = "Result calculated. Database save was not completed.";
      }

      const saveStatus = document.getElementById("saveStatus");
      if (saveStatus) saveStatus.textContent = saveStatusMessage;
    }

    function restartApp() {
      currentStep = 0;
      selectedAge = "";
      selectedDiagnosis = "";
      readingStartTime = null;
      readingTimeSeconds = 0;
      comprehensionAnswers = [];
      selfAnswers = [];
      compIndex = 0;
      selfIndex = 0;
      cameraReady = false;
      gazeSamples = [];
      saveStatusMessage = "Preparing result summary…";
      render();
    }

    window.addEventListener("blur", () => {
      const screen = document.getElementById("readingScreen");
      if (screen) readingBlurCount++;
    });

    window.addEventListener("beforeunload", () => {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }
      if (typeof webgazer !== "undefined") {
        try { webgazer.end(); } catch (_) {}
      }
    });

    render();
  </script>
</body>
</html>
